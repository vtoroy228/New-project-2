services:
  db:
    image: postgres:16-alpine
    container_name: telegram_dino_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_dino
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d telegram_dino']
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  pg_data:
